command:
  - "python"
  - "-m"
  - "uvicorn"
  - "backend.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: APP_ENV
    value: "production"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "YOUR_WAREHOUSE_ID"       # <- your SQL warehouse ID
  - name: DATABRICKS_CATALOG
    value: "YOUR_CATALOG"            # <- your Unity Catalog name
  - name: DATABRICKS_SCHEMA
    value: "YOUR_SCHEMA"             # <- schema where tables live
  - name: GENIE_SPACE_ID
    value: "YOUR_GENIE_SPACE_ID"     # <- Genie space ID for the chatbot
