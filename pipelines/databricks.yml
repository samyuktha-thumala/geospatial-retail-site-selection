bundle:
  name: geospatial-site-selection

include:
  - resources/jobs/bronze_job.yml
  - resources/jobs/silver_job.yml
  - resources/jobs/gold_job.yml
  - resources/jobs/orchestration_job.yml
  - resources/jobs/catalog_setup.yml

# Sync configuration files to workspace
sync:
  include:
    - "resources/configs/*.yml"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: YOUR_PROFILE    # ← set to your Databricks CLI profile
    variables:
      catalog: your_catalog    # ← your Unity Catalog name
      schema: your_schema      # ← schema to create tables in
      census_api_key: ""       # ← get free at api.census.gov/data/key_signup.html
      cluster_id: ""           # ← cluster with GDAL/GEOS/pyosmium (for census_boundaries + extract_pois)

variables:
  # Unity Catalog
  catalog:
    description: "Unity Catalog name"

  schema:
    description: "Schema name within catalog"

  # Census API Configuration
  census_api_key:
    description: "US Census Bureau API key (get free at api.census.gov/data/key_signup.html)"
    default: ""

  acs_year:
    description: "ACS 5-Year ending year"
    default: "2023"

  state_fips:
    description: "Comma-separated state FIPS codes, or 'all' for nationwide"
    default: "36"

  # OSM Configuration
  osm_url:
    description: "Geofabrik OSM download URL"
    default: "https://download.geofabrik.de/north-america/us/new-york-latest.osm.pbf"

  osm_region:
    description: "OSM region name"
    default: "new-york"

  # Cluster Configuration (needed for tasks with native C/C++ dependencies like GDAL, pyosmium)
  cluster_id:
    description: "Existing cluster ID with GDAL/GEOS/pyosmium pre-installed (needed for census_boundaries and extract_pois)"
    default: ""

  # Isochrone Configuration
  drive_time_buckets:
    description: "Comma-separated list of drive time buckets in minutes"
    default: "5,10,15,20,30"

  time_limit_minutes:
    description: "Maximum search time limit in minutes"
    default: "40"

  tolerance_meters:
    description: "Geometry simplification tolerance in meters"
    default: "50"

  isochrone_input_table:
    description: "Full table name for isochrone input"
    default: ""

  isochrone_output_table_name:
    description: "Output table name (with silver_ prefix)"
    default: "silver_store_isochrones"

  # POI Configuration
  state_filter:
    description: "State abbreviation for POI extraction (e.g., NY for New York)"
    default: "NY"

  # Notifications
  user_email:
    description: "Email address for job notifications"
    default: ""
