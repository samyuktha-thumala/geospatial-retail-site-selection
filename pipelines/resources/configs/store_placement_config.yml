# Format distribution
formats:
  express:
    count_pct: 0.33  # ~500
    placement:
      prefer_poi_categories: ["amenity_fuel", "amenity_fast_food", "building_university"]
      urbanicity_preference: ["urban", "suburban"]
      min_population_density: 500
  standard:
    count_pct: 0.47  # ~700
    placement:
      prefer_poi_categories: ["shop_supermarket", "shop_convenience", "shop_mall"]
      urbanicity_preference: ["suburban", "urban"]
      min_population_density: 1000
  flagship:
    count_pct: 0.20  # ~300
    placement:
      prefer_poi_categories: ["shop_department_store", "amenity_restaurant"]
      urbanicity_preference: ["urban"]
      min_population_density: 3000

# Competitor configuration (anonymized)
competitors:
  - brand: "Competitor A"
    count: 1500
    placement: "broad"  # Similar to standard placement
  - brand: "Competitor B"
    count: 1200
    placement: "urban"  # Urban-focused
  - brand: "Competitor C"
    count: 900
    placement: "regional"  # Regional clusters
  - brand: "Competitor D"
    count: 800
    placement: "suburban"  # Suburban focus
  - brand: "Competitor E"
    count: 600
    placement: "niche"  # Niche markets
